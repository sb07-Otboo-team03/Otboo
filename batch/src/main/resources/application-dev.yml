spring:
  main:
    web-application-type: none

  batch:
    jdbc:
      initialize-schema: never
      table-prefix: batch.BATCH_
    job:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/otboo
    username: otboo
    password: otboo123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.codeit.otboo: info
    org.hibernate.SQL: warn

management:
  endpoint:
    health:
      show-details: never