name: CI - Test and Update Badge

on:
  push:
    branches:
      - dev
      - 'feat/**'
  pull_request:
    branches:
      - dev
      - 'feat/**'

jobs:
  test-and-badge:
    name: CI Test Job
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Test with Gradle
        run: ./gradlew clean test jacocoRootReport
