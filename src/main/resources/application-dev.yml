server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/otboo
    username: otboo
    password: otboo123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.retry: debug
    org.springframework.web.socket: debug
    org.springframework.web.messaging: debug
    org.springframework.security: debug
    org.hibernate.sql: debug
    org.hibernate.type.descriptor.sql.basic: trace
    com.codeit.otboo: debug

management:
  endpoint:
    health:
      show-details: always

otboo:
  storage:
    type: local
    local:
      root-path: ./storage