spring:
  application:
    name: otboo

  profiles:
    active: dev

  sql:
    init:
      mode: never

  jpa:
    database: postgresql
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION}
      s3:
        bucket: ${AWS_S3_BUCKET}

otboo:
  storage:
    type: s3
    s3:
      path: binary

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

info:
  app:
    name: OtBoo
    version: 1.0.0

sse:
  event-queue-capacity: 100
  timeout: 300_000
api:
  kma-api-key: ${KMA_API_KEY}

servlet:
  multipart:
    maxFileSize: 10MB